<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MontXML - Robô Fiscal Premium 🤖</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS for Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- JSZip for ZIP support -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Tabulator for Advanced Grid -->
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
</head>
<body>
    <div id="bg-gradient"></div>
    
    <div class="app-shell">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="logo-container">
                <div class="logo-icon"><i data-lucide="bot"></i></div>
                <span class="logo-text">MontXML</span>
            </div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-item active" id="nav-home">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Conversor</span>
                </a>
                <a href="#" class="nav-item" id="nav-editor">
                    <i data-lucide="layout-template"></i>
                    <span>Editor Fiscal</span>
                </a>
                <a href="#" class="nav-item">
                    <i data-lucide="history"></i>
                    <span>Histórico</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="status-indicator">
                    <div class="dot green"></div>
                    <span>Sistema Online</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content">
            <header id="top-bar">
                <div class="header-left">
                    <h1 id="page-title">Dashboard Conversor</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <div id="clock">00:00</div>
                        <div class="divider"></div>
                        <i data-lucide="bell" class="icon-btn"></i>
                        <div class="avatar">K</div>
                    </div>
                </div>
            </header>

            <div class="content-body">
                <!-- View: Upload (Initial) -->
                <div id="view-upload" class="view-pane active">
                    <div class="upload-container">
                        <div id="drop-zone" class="drop-zone-premium">
                            <div class="drop-content">
                                <i data-lucide="upload-cloud" class="main-icon"></i>
                                <h2>Solte seus arquivos aqui</h2>
                                <p>Arraste XMLs individuais ou pastas compactadas em ZIP</p>
                                <button class="btn-select">Selecionar Arquivos</button>
                            </div>
                            <input type="file" id="file-input" multiple accept=".xml,.zip" style="display: none;">
                        </div>

                        <div id="results-area" style="display: none;">
                            <div class="results-header">
                                <div class="stats-cards">
                                    <div class="stat-card">
                                        <span class="label">Arquivos</span>
                                        <span id="stat-files" class="value">0</span>
                                    </div>
                                    <div class="stat-card">
                                        <span class="label">Itens Detectados</span>
                                        <span id="stat-items" class="value">0</span>
                                    </div>
                                </div>
                                <button id="btn-open-editor" class="btn-action">
                                    <i data-lucide="layout-template"></i>
                                    Abrir no Editor
                                </button>
                            </div>
                            <div id="file-list" class="file-grid-modern"></div>
                        </div>
                    </div>
                </div>

                <!-- View: Editor (Advanced) -->
                <div id="view-editor" class="view-pane">
                    <div class="editor-header">
                        <div class="editor-toolbar">
                            <button class="btn-tool" id="btn-save-modified-xml">
                                <i data-lucide="save"></i> Salvar Modificados
                            </button>
                            <button class="btn-tool secondary" id="btn-save-all-xml">
                                Baixar Todos (ZIP)
                            </button>
                            <div class="v-divider"></div>
                            <button class="btn-tool excel" id="btn-export-excel-all">
                                <i data-lucide="file-spreadsheet"></i> Exportar Tudo
                            </button>
                        </div>
                    </div>
                    <div class="grid-container">
                        <div id="data-grid"></div>
                    </div>
                </div>
            </div>

            <!-- Footer Stats -->
            <footer id="app-footer">
                <div id="status-msg">Pronto para processar nota fiscal eletrônica.</div>
                <div class="app-version">v5.0 Premium</div>
            </footer>
        </main>
    </div>

    <script src="logic.js"></script>
    <script>
        lucide.createIcons();
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
